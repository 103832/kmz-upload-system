<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAHA - دخول</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<div class="login-box">
<div class="logo">
<div class="ic">B</div>
<h1>BAHA</h1>
<p>منصة الخرائط والملفات</p>
</div>
<form id="loginForm">
<div class="fg"><label>المستخدم</label><input type="text" id="username" placeholder="اسم المستخدم" required></div>
<div class="fg"><label>كلمة السر</label><input type="password" id="password" placeholder="كلمة السر" required></div>
<button type="submit" class="btn btn-pri">دخول</button>
<div class="err" id="err"></div>
</form>
</div>
<script>
document.getElementById('loginForm').onsubmit = async function(e) {
e.preventDefault(); const btn = this.querySelector('button'); const er = document.getElementById('err');
btn.disabled = true; btn.textContent = '...';
try {
const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
const d = await r.json();
if (d.ok) { window.location.href = 'dash.html'; }
else { er.textContent = d.msg; er.classList.add('show'); }
} catch(e) { er.textContent = 'خطأ في الاتصال'; er.classList.add('show'); }
finally { btn.disabled = false; btn.textContent = 'دخول'; }
};
</script>
</body>
</html>
