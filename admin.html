<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAHA - الإدارة</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<button class="sb-toggle" id="st">☰</button>
<div class="dash">
<aside class="sb" id="sb">
<div class="sb-hdr"><div class="ic">B</div><h2>BAHA</h2><p id="ud"></p></div>
<nav class="sb-nav">
<a href="dash.html" class="nv"><span class="ico">📂</span> الملفات</a>
<a href="admin.html" class="nv act"><span class="ico">⚙️</span> الإدارة</a>
<a href="#" class="nv" id="lo"><span class="ico">🚪</span> خروج</a>
</nav>
<div class="sb-ft"><div class="usr"><div class="usr-av" id="ua">م</div><div><div class="usr-nm" id="un">Admin</div><div class="usr-rl" id="ur">Admin</div></div></div></div>
</aside>
<main class="mn">
<div class="ph"><h1>الإدارة</h1><p>إدارة المستخدمين والمجلدات والملفات</p></div>

<div class="sec">
<h2>📂 المجلدات (المكاتب)</h2>
<div style="margin-bottom:12px;display:flex;gap:8px">
<input type="text" id="folderName" placeholder="اسم المكتب الجديد" style="padding:8px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.05);color:var(--t);font-size:13px;flex:1;outline:none">
<button class="btn btn-suc btn-sm" onclick="addFolder()">➕ إضافة</button>
</div>
<div id="folderList"></div>
</div>

<div class="sec">
<h2>👥 المستخدمين</h2>
<div style="margin-bottom:12px"><button class="btn btn-suc btn-sm" onclick="addUser()">+ إضافة</button></div>
<div style="overflow-x:auto">
<table class="tbl"><thead><tr><th>#</th><th>الاسم</th><th>المستخدم</th><th>الصلاحية</th><th>إجراءات</th></tr></thead>
<tbody id="utb"><tr><td colspan="5" style="text-align:center;color:var(--ts)">...</td></tr></tbody></table>
</div></div>

<div class="sec">
<h2>🗺️ الملفات المرفوعة</h2>
<div class="flist" id="fl"></div></div>

<div class="sec">
<h2>⚙️ الإعدادات</h2>
<div style="max-width:350px">
<div class="fg"><label>اسم التطبيق</label><input type="text" id="appn" placeholder="اسم"></div>
<button class="btn btn-pri btn-sm" onclick="saveApp()">حفظ</button>
</div></div>
</main></div>

<div class="modal-overlay" id="um">
<div class="modal">
<h2 id="umt">إضافة مستخدم</h2>
<input type="hidden" id="eid">
<div class="modal-err" id="umerr"></div>
<div class="fg"><label>الاسم</label><input type="text" id="unm" placeholder="الاسم الكامل"></div>
<div class="fg"><label>المستخدم</label><input type="text" id="uus" placeholder="اسم المستخدم"></div>
<div class="fg"><label>كلمة السر</label><input type="text" id="upw" placeholder="كلمة السر"></div>
<div class="fg"><label>الصلاحية</label><select id="url"><option value="user">مستخدم</option><option value="admin">Admin</option></select></div>
<div class="mbtns"><button class="btn btn-suc" onclick="svUsr()">حفظ</button><button class="btn btn-cncl" onclick="cls('um')">إلغاء</button></div></div></div>

<script src="js/admin.js?v=4"></script>
</body>
</html>
